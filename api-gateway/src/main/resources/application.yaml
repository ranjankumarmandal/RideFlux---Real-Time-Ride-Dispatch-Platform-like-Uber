server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:

      default-filters:
        - AddResponseHeader=X-Gateway, RideFlux

      routes:

        - id: identity-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: rider-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/rides/**

        - id: driver-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/drivers/**

        - id: dispatch-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/dispatch/**

        - id: trip-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/trips/**

        - id: payment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/payments/**

        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/notifications/**